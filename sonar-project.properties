# Root Sonar configuration for the multi-module shopping platform.
sonar.projectKey=shopping-platform-parent
sonar.projectName=shopping-platform-parent
sonar.sourceEncoding=UTF-8

# Maven drives the module structure; these exclusions keep generated and build
# output from polluting analysis results.
sonar.exclusions=**/target/**,**/generated-sources/**
sonar.coverage.exclusions=**/target/**,**/generated-sources/**,**/api/**,**/api/model/**