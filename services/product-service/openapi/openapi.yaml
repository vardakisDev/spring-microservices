openapi: 3.0.3
info:
  title: Product Service API
  version: 1.0.0
  description: API-first contract for product-service ownership of catalog products and pricing.
servers:
  - url: https://product-service.shopping-platform.example
    description: Primary HTTPS product-service endpoint used for contract review and security audit.
tags:
  - name: Products
    description: Product management operations.
security:
  - BearerAuth: []
paths:
  /products:
    get:
      tags: [Products]
      operationId: listProducts
      summary: List products
      description: Returns all products available in the catalog.
      responses:
        '200':
          description: Products retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCollectionResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '406':
          $ref: '#/components/responses/NotAcceptableResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        default:
          $ref: '#/components/responses/DefaultErrorResponse'
    post:
      tags: [Products]
      operationId: createProduct
      summary: Create product
      description: Creates a product that can be added to shopping carts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
            example:
              name: Laptop Pro 16
              description: High-end professional laptop for workstation workloads.
              price: 2499.99
      responses:
        '201':
          description: Product created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '406':
          $ref: '#/components/responses/NotAcceptableResponse'
        '415':
          $ref: '#/components/responses/UnsupportedMediaTypeResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        default:
          $ref: '#/components/responses/DefaultErrorResponse'
  /products/{productId}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [Products]
      operationId: getProduct
      summary: Get product
      description: Retrieves a single product by identifier.
      responses:
        '200':
          description: Product retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '406':
          $ref: '#/components/responses/NotAcceptableResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        default:
          $ref: '#/components/responses/DefaultErrorResponse'
    put:
      tags: [Products]
      operationId: updateProduct
      summary: Update product
      description: Updates mutable product fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
            example:
              name: Laptop Pro 16 Refresh
              description: Updated professional laptop with larger SSD and more RAM.
              price: 2699.99
      responses:
        '200':
          description: Product updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '406':
          $ref: '#/components/responses/NotAcceptableResponse'
        '415':
          $ref: '#/components/responses/UnsupportedMediaTypeResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        default:
          $ref: '#/components/responses/DefaultErrorResponse'
    delete:
      tags: [Products]
      operationId: deleteProduct
      summary: Delete product
      description: Deletes a product from the catalog.
      responses:
        '204':
          description: Product deleted successfully.
        '406':
          $ref: '#/components/responses/NotAcceptableResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        default:
          $ref: '#/components/responses/DefaultErrorResponse'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token used to authenticate API requests.
  parameters:
    ProductId:
      name: productId
      in: path
      required: true
      description: Unique identifier of the product.
      example: '123e4567-e89b-12d3-a456-426614174001'
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
        pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$'
  responses:
    BadRequestResponse:
      description: The request was invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedResponse:
      description: Authentication is required or the bearer token is invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenResponse:
      description: The authenticated principal is not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundResponse:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictResponse:
      description: The request conflicts with the current state of the target resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotAcceptableResponse:
      description: The requested representation is not available for the supplied Accept header.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnsupportedMediaTypeResponse:
      description: The request Content-Type is unsupported for this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequestsResponse:
      description: The client sent too many requests in a given amount of time.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    DefaultErrorResponse:
      description: Unexpected error response for unclassified failures.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    CreateProductRequest:
      type: object
      additionalProperties: false
      required: [name, description, price]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
          pattern: '^[^\r\n\t]+$'
          description: Product display name.
        description:
          type: string
          minLength: 1
          maxLength: 1000
          pattern: '^[^\r\n\t]+$'
          description: Human readable product description.
        price:
          type: number
          format: double
          minimum: 0.01
          maximum: 1000000
          multipleOf: 0.01
          description: Product unit price in euro.
    UpdateProductRequest:
      type: object
      additionalProperties: false
      required: [name, description, price]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
          pattern: '^[^\r\n\t]+$'
          description: Product display name.
        description:
          type: string
          minLength: 1
          maxLength: 1000
          pattern: '^[^\r\n\t]+$'
          description: Human readable product description.
        price:
          type: number
          format: double
          minimum: 0.01
          maximum: 1000000
          multipleOf: 0.01
          description: Product unit price in euro.
    ProductResponse:
      type: object
      additionalProperties: false
      required: [id, name, description, price, currency, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$'
          description: Unique identifier of the product.
        name:
          type: string
          minLength: 1
          maxLength: 150
          pattern: '^[^\r\n\t]+$'
          description: Product display name.
        description:
          type: string
          minLength: 1
          maxLength: 1000
          pattern: '^[^\r\n\t]+$'
          description: Human readable product description.
        price:
          type: number
          format: double
          minimum: 0
          maximum: 1000000
          multipleOf: 0.01
          description: Product unit price in euro.
        currency:
          type: string
          enum: [EUR]
          description: Currency used by the service.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the product was created.
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the product was last updated.
    ProductCollectionResponse:
      type: object
      additionalProperties: false
      required: [products]
      properties:
        products:
          type: array
          description: Products in the catalog.
          minItems: 0
          maxItems: 10000
          items:
            $ref: '#/components/schemas/ProductResponse'
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message, timestamp]
      properties:
        code:
          type: string
          minLength: 3
          maxLength: 100
          pattern: '^[A-Z0-9_]+$'
          description: Stable application-specific error code.
        message:
          type: string
          minLength: 1
          maxLength: 500
          pattern: '^[^\r\n\t]+$'
          description: Human readable explanation of the error.
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the error was generated.