spring:
  application:
    name: user-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/user_service}
    username: ${DB_USERNAME:user_service}
    password: ${DB_PASSWORD:user_service}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful
app:
  security:
    jwt:
      issuer: ${JWT_ISSUER:shopping-platform-local}
      secret: ${JWT_SECRET:shopping-platform-local-signing-secret-2026}
      audience: ${JWT_AUDIENCE:user-service}