openapi: 3.0.3
info:
  title: User Service API
  version: 1.0.0
  description: API-first contract for user-service ownership of user data and VIP eligibility.
servers:
  - url: https://user-service.shopping-platform.example
    description: Primary HTTPS user-service endpoint used for contract review and security audit.
tags:
  - name: Users
    description: User management operations.
security:
  - BearerAuth: []
paths:
  /users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List users
      description: Returns all users currently registered in the system.
      responses:
        '200':
          description: Users retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCollectionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
    post:
      tags: [Users]
      operationId: createUser
      summary: Create user
      description: Creates a user that can own carts and may be eligible for VIP carts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
  /users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Users]
      operationId: getUser
      summary: Get user
      description: Retrieves a single user by identifier.
      responses:
        '200':
          description: User retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    put:
      tags: [Users]
      operationId: updateUser
      summary: Update user
      description: Updates mutable user fields including VIP status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
    delete:
      tags: [Users]
      operationId: deleteUser
      summary: Delete user
      description: Deletes a user when no business constraint prevents it.
      responses:
        '204':
          description: User deleted successfully.
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token used to authenticate API requests.
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      description: Unique identifier of the user.
      schema:
        type: string
        format: uuid
  responses:
    BadRequestResponse:
      description: The request was invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedResponse:
      description: Authentication is required or the bearer token is invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenResponse:
      description: The authenticated principal is not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundResponse:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictResponse:
      description: The request conflicts with the current state of the target resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    CreateUserRequest:
      type: object
      additionalProperties: false
      required: [email, firstName, lastName, vip]
      properties:
        email:
          type: string
          format: email
          minLength: 5
          maxLength: 255
          description: Unique email address of the user.
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          description: Given name of the user.
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          description: Family name of the user.
        vip:
          type: boolean
          description: Whether the user is allowed to create VIP carts.
    UpdateUserRequest:
      type: object
      additionalProperties: false
      required: [email, firstName, lastName, vip]
      properties:
        email:
          type: string
          format: email
          minLength: 5
          maxLength: 255
          description: Unique email address of the user.
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          description: Given name of the user.
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          description: Family name of the user.
        vip:
          type: boolean
          description: Whether the user is allowed to create VIP carts.
    UserResponse:
      type: object
      additionalProperties: false
      required: [id, email, firstName, lastName, vip, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier of the user.
        email:
          type: string
          format: email
          description: Unique email address of the user.
        firstName:
          type: string
          description: Given name of the user.
        lastName:
          type: string
          description: Family name of the user.
        vip:
          type: boolean
          description: Whether the user is allowed to create VIP carts.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the user was created.
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the user was last updated.
    UserCollectionResponse:
      type: object
      additionalProperties: false
      required: [users]
      properties:
        users:
          type: array
          description: Users in the system.
          minItems: 0
          maxItems: 10000
          items:
            $ref: '#/components/schemas/UserResponse'
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message, timestamp]
      properties:
        code:
          type: string
          minLength: 3
          maxLength: 100
          description: Stable application-specific error code.
        message:
          type: string
          minLength: 1
          maxLength: 500
          description: Human readable explanation of the error.
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the error was generated.