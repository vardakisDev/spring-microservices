spring:
  application:
    name: cart-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cart_service}
    username: ${DB_USERNAME:cart_service}
    password: ${DB_PASSWORD:cart_service}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
app:
  security:
    jwt:
      issuer: ${JWT_ISSUER:shopping-platform-local}
      secret: ${JWT_SECRET:shopping-platform-local-signing-secret-2026}
      audience: ${JWT_AUDIENCE:cart-service}
      token-ttl: ${JWT_TOKEN_TTL:PT5M}
      downstream:
        user-service-audience: ${USER_SERVICE_JWT_AUDIENCE:user-service}
        product-service-audience: ${PRODUCT_SERVICE_JWT_AUDIENCE:product-service}
        scope: ${INTERNAL_SERVICE_SCOPE:internal.read}
clients:
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:8081}
  product-service:
    base-url: ${PRODUCT_SERVICE_BASE_URL:http://localhost:8082}