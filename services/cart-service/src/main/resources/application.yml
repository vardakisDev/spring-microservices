spring:
  application:
    name: cart-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cart_service}
    username: ${DB_USERNAME:cart_service}
    password: ${DB_PASSWORD:cart_service}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
clients:
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:8081}
  product-service:
    base-url: ${PRODUCT_SERVICE_BASE_URL:http://localhost:8082}