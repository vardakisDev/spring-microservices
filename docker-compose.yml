services:
  postgres:
    image: postgres:17-alpine
    container_name: shopping-platform-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/user_service
      DB_USERNAME: user_service
      DB_PASSWORD: user_service
      JWT_ISSUER: shopping-platform-local
      JWT_SECRET: shopping-platform-local-signing-secret-2026
      JWT_AUDIENCE: user-service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "18081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/v3/api-docs || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://postgres:5432/product_service
      DB_USERNAME: product_service
      DB_PASSWORD: product_service
      JWT_ISSUER: shopping-platform-local
      JWT_SECRET: shopping-platform-local-signing-secret-2026
      JWT_AUDIENCE: product-service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "18082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8082/v3/api-docs || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  cart-service:
    build:
      context: .
      dockerfile: services/cart-service/Dockerfile
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/cart_service
      DB_USERNAME: cart_service
      DB_PASSWORD: cart_service
      USER_SERVICE_BASE_URL: http://user-service:8081
      PRODUCT_SERVICE_BASE_URL: http://product-service:8082
      JWT_ISSUER: shopping-platform-local
      JWT_SECRET: shopping-platform-local-signing-secret-2026
      JWT_AUDIENCE: cart-service
      USER_SERVICE_JWT_AUDIENCE: user-service
      PRODUCT_SERVICE_JWT_AUDIENCE: product-service
      INTERNAL_SERVICE_SCOPE: internal.read
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/v3/api-docs || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
